<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat en vivo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0f172a;color:white;display:flex;flex-direction:column;height:100vh}
header{padding:12px;background:#1e293b;text-align:center;font-weight:bold}
#status{font-size:11px;color:#94a3b8;text-align:center;padding:4px 8px;background:#020617}
#debug{background:#020617;border-bottom:1px solid #1e3a5f;padding:5px 10px;font-size:10px;font-family:monospace;max-height:80px;overflow-y:auto;color:#38bdf8}
#chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:85%;padding:8px 12px;border-radius:10px;background:#1e293b}
.me{background:#4f46e5;margin-left:auto}
.nick{font-size:10px;opacity:.6;margin-bottom:2px}
#inputArea{display:flex;gap:6px;padding:8px;background:#020617}
#msgInput{flex:1;padding:9px 12px;border:none;border-radius:8px;background:#1e293b;color:white;font-size:14px;outline:none}
#msgInput:disabled{opacity:.4}
#sendBtn{padding:9px 16px;background:#22c55e;border:none;border-radius:8px;color:white;font-weight:600;cursor:pointer}
#sendBtn:disabled{background:#14532d;cursor:not-allowed}
#nickModal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10}
#nickBox{background:#1e293b;padding:24px;border-radius:14px;text-align:center;width:260px}
#nickBox h3{margin-bottom:14px}
#nickInput{width:100%;padding:9px;border:none;border-radius:7px;background:#0f172a;color:white;font-size:15px;text-align:center;outline:none;margin-bottom:12px}
#enterBtn{width:100%;padding:9px;background:#4f46e5;border:none;border-radius:7px;color:white;font-size:15px;cursor:pointer}
.log-ok{color:#4ade80}
.log-err{color:#f87171}
.log-ev{color:#facc15}
</style>
</head>
<body>
<header>💬 Chat en vivo</header>
<div id="status">Esperando nick...</div>
<div id="debug"></div>
<div id="chat"></div>
<div id="inputArea">
  <input id="msgInput" placeholder="GATOMensaje..." disabled>
  <button id="sendBtn" disabled>Enviar</button>
</div>
<div id="nickModal">
  <div id="nickBox">
    <h3>Tu nick</h3>
    <input id="nickInput" placeholder="Nombre" maxlength="24">
    <button id="enterBtn">Entrar</button>
  </div>
</div>

<script type="module">
import { generateSecretKey, getPublicKey, finalizeEvent } from 'https://esm.sh/nostr-tools@2/pure';
import { SimplePool } from 'https://esm.sh/nostr-tools@2/pool';

const ROOM   = "tpop-chat-001";
const RELAYS = [
  "wss://relay.damus.io",
  "wss://nos.lol",
  "wss://offchain.pub",
];

let pool  = new SimplePool();
let sk    = generateSecretKey();
let pk    = getPublicKey(sk);
let nick  = "";
let seen  = new Set();

const statusEl = document.getElementById("status");
const debugEl  = document.getElementById("debug");
const chatEl   = document.getElementById("chat");
const msgInput = document.getElementById("msgInput");
const sendBtn  = document.getElementById("sendBtn");

function log(msg, cls="") {
  const d = document.createElement("div");
  if (cls) d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  debugEl.appendChild(d);
  debugEl.scrollTop = debugEl.scrollHeight;
}

function setStatus(t) { statusEl.textContent = t; }

function addMsg(user, text, isMe=false) {
  const d = document.createElement("div");
  d.className = "msg" + (isMe ? " me" : "");
  d.innerHTML = `<div class="nick">${esc(user)}</div><div>${esc(text)}</div>`;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function connect() {
  setStatus("Conectando...");
  log(`Sala: ${ROOM} | pk: ${pk.slice(0,10)}...`);

  const since = Math.floor(Date.now()/1000) - 3600;

  pool.subscribeMany(
    RELAYS,
    [{ kinds: [1], "#t": [ROOM], since }],
    {
      closeOnEose: false,

      onevent(ev) {
        log(`📨 evento de ${ev.pubkey.slice(0,8)}...`, "log-ev");
        if (seen.has(ev.id)) return;
        seen.add(ev.id);
        try {
          const { user, text } = JSON.parse(ev.content);
          addMsg(user, text, ev.pubkey === pk);
        } catch(e) {
          log("Error parseando: " + e.message, "log-err");
        }
      },

      oneose() {
        log("EOSE — escuchando tiempo real ✓", "log-ok");
        setStatus(`Conectado — sala: ${ROOM}`);
        msgInput.disabled = false;
        sendBtn.disabled  = false;
        msgInput.focus();
      }
    }
  );
}

async function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  const event = finalizeEvent({
    kind: 1,
    created_at: Math.floor(Date.now()/1000),
    tags: [["t", ROOM]],
    content: JSON.stringify({ user: nick, text })
  }, sk);

  seen.add(event.id);
  addMsg(nick, text, true);
  msgInput.value = "";

  const pubs = pool.publish(RELAYS, event);
  let ok = 0;
  for (const p of pubs) {
    p.then(() => { ok++; log(`✓ relay aceptó (${ok}/${RELAYS.length})`, "log-ok"); })
     .catch(e => log(`✗ relay rechazó: ${e?.message||e}`, "log-err"));
  }
}

msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener("click", send);

document.getElementById("enterBtn").addEventListener("click", () => {
  nick = document.getElementById("nickInput").value.trim() || "anon";
  document.getElementById("nickModal").style.display = "none";
  connect();
});
document.getElementById("nickInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("enterBtn").click();
});
</script>
</body>
</html>
