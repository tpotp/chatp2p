<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Debug</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0f172a;color:white;display:flex;flex-direction:column;height:100vh;font-size:13px}
header{padding:10px;background:#1e293b;text-align:center;font-weight:bold}
#debug{background:#020617;border-bottom:1px solid #1e3a5f;padding:6px 10px;font-size:10px;font-family:monospace;max-height:120px;overflow-y:auto;color:#38bdf8}
#chat{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:85%;padding:8px 12px;border-radius:10px;background:#1e293b}
.me{background:#4f46e5;margin-left:auto}
.nick{font-size:10px;opacity:.6;margin-bottom:2px}
#inputArea{display:flex;gap:6px;padding:8px;background:#020617}
#msgInput{flex:1;padding:8px 12px;border:none;border-radius:8px;background:#1e293b;color:white;font-size:14px;outline:none}
#sendBtn{padding:8px 16px;background:#22c55e;border:none;border-radius:8px;color:white;font-weight:600;cursor:pointer}
#sendBtn:disabled{background:#14532d;cursor:not-allowed}
#nickModal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10}
#nickBox{background:#1e293b;padding:24px;border-radius:14px;text-align:center;width:260px}
#nickBox h3{margin-bottom:14px}
#nickInput{width:100%;padding:9px;border:none;border-radius:7px;background:#0f172a;color:white;font-size:15px;text-align:center;outline:none;margin-bottom:12px}
#enterBtn{width:100%;padding:9px;background:#4f46e5;border:none;border-radius:7px;color:white;font-size:15px;cursor:pointer}
.log-ok{color:#4ade80}
.log-err{color:#f87171}
.log-info{color:#38bdf8}
.log-ev{color:#facc15}
</style>
</head>
<body>
<header>💬 Chat Debug</header>
<div id="debug"><div>Iniciando...</div></div>
<div id="chat"></div>
<div id="inputArea">
  <input id="msgInput" placeholder="Mensaje..." disabled>
  <button id="sendBtn" disabled>Enviar</button>
</div>
<div id="nickModal">
  <div id="nickBox">
    <h3>Tu nick</h3>
    <input id="nickInput" placeholder="Nombre" maxlength="24">
    <button id="enterBtn">Entrar</button>
  </div>
</div>

<script type="module">
import { generateSecretKey, getPublicKey, finalizeEvent } from 'https://esm.sh/nostr-tools@2/pure';
import { SimplePool } from 'https://esm.sh/nostr-tools@2/pool';

// ─── ROOM TAG ────────────────────────────────────────────
const ROOM = "tpop-chat-001"; // tag único para esta sala
const RELAYS = [
  "wss://relay.damus.io",
  "wss://nos.lol",
  "wss://relay.nostr.band",
  "wss://relay.snort.social",
  "wss://offchain.pub",
];

let pool = new SimplePool();
let sk = generateSecretKey();
let pk = getPublicKey(sk);
let nick = "";
let seenIds = new Set();
let connectedRelays = 0;

const debugEl = document.getElementById("debug");
const chatEl  = document.getElementById("chat");
const msgInput = document.getElementById("msgInput");
const sendBtn  = document.getElementById("sendBtn");

// ─── LOG ──────────────────────────────────────────────────
function log(msg, cls="log-info") {
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  debugEl.appendChild(d);
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log(msg);
}

// ─── MENSAJE EN CHAT ──────────────────────────────────────
function addMsg(user, text, isMe=false) {
  const d = document.createElement("div");
  d.className = "msg" + (isMe?" me":"");
  d.innerHTML = `<div class="nick">${esc(user)}</div><div>${esc(text)}</div>`;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ─── CONECTAR ─────────────────────────────────────────────
async function connect() {
  log(`pk: ${pk.slice(0,12)}...`);
  log(`Sala: ${ROOM}`);
  log(`Intentando ${RELAYS.length} relays...`);

  // Probar cada relay individualmente
  for (const url of RELAYS) {
    try {
      const ws = new WebSocket(url);
      ws.onopen = () => {
        connectedRelays++;
        log(`✓ Conectado: ${url}`, "log-ok");
        ws.close();
      };
      ws.onerror = () => log(`✗ Falló: ${url}`, "log-err");
    } catch(e) {
      log(`✗ Error: ${url} — ${e.message}`, "log-err");
    }
  }

  const since = Math.floor(Date.now()/1000) - 7200; // últimas 2h

  try {
    const sub = pool.subscribeMany(
      RELAYS,
      [{ kinds:[1], "#t":[ROOM], since }],
      {
        onevent(ev) {
          log(`📨 Evento recibido! id=${ev.id.slice(0,8)}... pubkey=${ev.pubkey.slice(0,8)}...`, "log-ev");
          if (seenIds.has(ev.id)) { log("  (duplicado, ignorado)"); return; }
          seenIds.add(ev.id);
          try {
            const data = JSON.parse(ev.content);
            log(`  → user="${data.user}" text="${data.text}"`, "log-ev");
            const isMe = ev.pubkey === pk;
            addMsg(data.user, data.text, isMe);
          } catch(e) {
            log(`  → Error parseando content: ${e.message}`, "log-err");
            log(`  → content raw: ${ev.content.slice(0,80)}`, "log-err");
          }
        },
        oneose() {
          log("EOSE — fin de eventos históricos, escuchando en tiempo real", "log-ok");
          msgInput.disabled = false;
          sendBtn.disabled = false;
          msgInput.focus();
        }
      }
    );
    log("Suscripción creada OK", "log-ok");
  } catch(e) {
    log(`Error al suscribir: ${e.message}`, "log-err");
  }
}

// ─── ENVIAR ───────────────────────────────────────────────
async function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  const template = {
    kind: 1,
    created_at: Math.floor(Date.now()/1000),
    tags: [["t", ROOM]],
    content: JSON.stringify({ user: nick, text })
  };

  let event;
  try {
    event = finalizeEvent(template, sk);
    log(`📤 Enviando evento id=${event.id.slice(0,8)}...`);
  } catch(e) {
    log(`Error al firmar: ${e.message}`, "log-err");
    return;
  }

  seenIds.add(event.id);
  addMsg(nick, text, true);
  msgInput.value = "";

  const pubs = pool.publish(RELAYS, event);
  let ok = 0, fail = 0;
  for (const p of pubs) {
    p.then(() => { ok++; log(`  ✓ Relay aceptó (${ok} ok)`, "log-ok"); })
     .catch(e => { fail++; log(`  ✗ Relay rechazó: ${e?.message||e}`, "log-err"); });
  }
}

// ─── EVENTOS UI ───────────────────────────────────────────
msgInput.addEventListener("keydown", e => {
  if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener("click", send);

document.getElementById("enterBtn").addEventListener("click", () => {
  nick = document.getElementById("nickInput").value.trim() || "anon";
  document.getElementById("nickModal").style.display = "none";
  connect();
});
document.getElementById("nickInput").addEventListener("keydown", e => {
  if (e.key==="Enter") document.getElementById("enterBtn").click();
});
</script>
</body>
</html>
